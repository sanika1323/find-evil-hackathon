  <marker id="pm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#7F77DD"/></marker>
  <marker id="amk" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#B9770E"/></marker>
</defs>

<text x="720" y="34" text-anchor="middle" class="ttl ink" font-size="25">Find Evil! — Autonomous DFIR Triage Agent</text>
<text x="720" y="56" text-anchor="middle" class="mut" font-size="12">Single autonomous agent (Direct Agent Extension, Claude Code) · two-phase pipeline · no MCP servers</text>
<g font-size="11" class="mut">
  <text x="120" y="86">🔒 architectural — cannot bypass</text>
  <text x="430" y="86">📝 prompt-based (CLAUDE.md) — could ignore</text>
  <line x1="820" y1="82" x2="848" y2="82" stroke="#C0392B" stroke-width="2.5" stroke-dasharray="6 4"/><text x="854" y="86">trust boundary</text>
  <line x1="1010" y1="82" x2="1038" y2="82" stroke="#B9770E" stroke-width="2.5"/><text x="1044" y="86">self-correction loop</text>
</g>

