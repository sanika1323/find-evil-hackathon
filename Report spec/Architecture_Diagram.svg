<rect x="24" y="150" width="332" height="712" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="2"/>
<text x="40" y="176" class="gt bt" font-size="13">🔒 ARCHITECTURAL GUARDRAILS</text>
<text x="40" y="193" class="gt" font-size="10">OS / config enforced — model CANNOT bypass</text>
<g font-size="10">
  <rect x="38" y="202" width="304" height="38" rx="7" fill="#fff" stroke="#1D9E75"/><text x="50" y="218" class="gt bt">chmod 444 + read-only mount</text><text x="50" y="233" class="gt" font-size="9">original image is immutable</text>
  <rect x="38" y="246" width="304" height="38" rx="7" fill="#fff" stroke="#1D9E75"/><text x="50" y="262" class="gt bt">SHA-256 baseline + verify</text><text x="50" y="277" class="gt" font-size="9">re-checked after every run</text>
  <rect x="38" y="290" width="304" height="38" rx="7" fill="#fff" stroke="#1D9E75"/><text x="50" y="306" class="gt bt">deny-list (writes blocked)</text><text x="50" y="321" class="gt" font-size="9">dd·rm·mv·cp·mount·mkfs·tee·shred</text>
  <rect x="38" y="334" width="304" height="38" rx="7" fill="#fff" stroke="#1D9E75"/><text x="50" y="350" class="gt bt">dontAsk + read-only TSK allow-list</text><text x="50" y="365" class="gt" font-size="9">only mmls / fls / icat / fsstat</text>
  <rect x="38" y="378" width="304" height="38" rx="7" fill="#fff" stroke="#1D9E75"/><text x="50" y="394" class="gt bt">writes confined to sandbox scratch</text><text x="50" y="409" class="gt" font-size="9">never the evidence</text>
</g>
<text x="40" y="440" class="gt bt" font-size="10.5">Enforcement point</text>
<text x="40" y="456" class="gt" font-size="9.5">OS file permissions + Claude Code permission engine</text>
<rect x="38" y="468" width="304" height="104" rx="8" fill="#fff" stroke="#1D9E75"/>
<text x="50" y="490" class="gt bt" font-size="10.5">If a forbidden command is attempted:</text>
<text x="50" y="510" class="gt" font-size="9.5">→ DENIED before execution; the call is logged.</text>
<text x="50" y="528" class="gt" font-size="9.5">→ evidence bytes are unchanged.</text>
<text x="50" y="548" class="gt bt" font-size="9.5">Spoliation impact: NONE.</text>
<text x="50" y="565" class="gt" font-size="9">SHA-256 pre/post → court-defensible custody.</text>
<text x="40" y="600" class="gt" font-size="9.5">These controls protect the evidence zone, the</text>
<text x="40" y="615" class="gt" font-size="9.5">boundary crossing, and every tool call. →</text>
<rect x="38" y="636" width="304" height="206" rx="8" fill="#0B3D62"/>
<text x="190" y="664" text-anchor="middle" fill="#fff" font-size="13" class="bt">SPOLIATION TEST ✓</text>
<text x="190" y="686" text-anchor="middle" fill="#cfe6da" font-size="9.5">dd / rm / mv / mount on the image</text>
<text x="190" y="702" text-anchor="middle" fill="#cfe6da" font-size="9.5">→ all blocked.</text>
<text x="190" y="724" text-anchor="middle" fill="#cfe6da" font-size="9.5">SHA-256 identical before &amp; after</text>
<text x="190" y="740" text-anchor="middle" fill="#cfe6da" font-size="9.5">every run — no modification.</text>
<text x="190" y="772" text-anchor="middle" fill="#9fe1cb" font-size="9.5">VALIDATED on both cases</text>
<text x="190" y="792" text-anchor="middle" fill="#fff" font-size="10">Mr. Evil ✓ · M57-Jean ✓</text>
<text x="190" y="812" text-anchor="middle" fill="#cfe6da" font-size="9.5">one generalist agent</text>
<text x="190" y="828" text-anchor="middle" fill="#cfe6da" font-size="9.5">~62 s · 5 tool calls / case</text>

