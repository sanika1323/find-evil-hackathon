  .ttl{font-weight:800;} .hd{font-weight:700;} .bt{font-weight:700;}
  .ink{fill:#1a1a1a;} .mut{fill:#555;}
  @media (prefers-color-scheme:dark){ .ink{fill:#ededed;} .mut{fill:#b6b6b6;} }
  .nt{fill:#2C2C2A;} .gt{fill:#08412f;} .pt{fill:#26215C;} .btx{fill:#0c3a63;} .kt{fill:#4B1528;} .rt{fill:#7a1d10;} .am{fill:#7a4f08;}
  rect{stroke-width:1.5;}
</style>
