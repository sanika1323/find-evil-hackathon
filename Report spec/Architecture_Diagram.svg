<svg viewBox="0 0 1440 1140" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t4 d4">
<title id="t4">Find Evil DFIR agent — final architecture</title>
<desc id="d4">A central data flow (disk images, collector, evidence bundle, agent, output) runs through a writable sandbox below a trust boundary. The agent classifies the case, routes to a track, evaluates findings, and may run a targeted read-only icat to confirm a finding before re-evaluating (a light self-correction loop). Left rail: architectural guardrails (OS/config, cannot bypass). Right column: an Autonomous Decisions callout and the CLAUDE.md DFIR protocol (prompt-based). Output includes a stream-json run log; findings cite inodes so each is traceable to its tool call.</desc>
