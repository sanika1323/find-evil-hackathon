  <path d="M356 200 L408 192"/>
  <path d="M356 305 L408 380"/>
</g>

<rect x="960" y="150" width="456" height="196" rx="12" fill="#0B3D62" stroke="#0B3D62"/>
<text x="980" y="180" fill="#ffffff" class="bt" font-size="15">🤖 AUTONOMOUS DECISIONS</text>
<text x="980" y="199" fill="#bcd4ea" font-size="10.5">the agent decides — this is not a fixed script</text>
<g font-size="11.5" fill="#ffffff">
  <text x="982" y="226"><tspan fill="#5DCAA5" font-weight="bold">✓ </tspan>classify the case type</text>
  <text x="982" y="250"><tspan fill="#5DCAA5" font-weight="bold">✓ </tspan>choose the investigation workflow</text>
  <text x="982" y="274"><tspan fill="#5DCAA5" font-weight="bold">✓ </tspan>decide what evidence is needed</text>
  <text x="982" y="298"><tspan fill="#5DCAA5" font-weight="bold">✓ </tspan>perform targeted retrieval</text>
  <text x="982" y="322"><tspan fill="#5DCAA5" font-weight="bold">✓ </tspan>self-evaluate its findings</text>
  <text x="1218" y="226"><tspan fill="#5DCAA5" font-weight="bold">✓ </tspan>produce the final report</text>
</g>

<rect x="960" y="366" width="456" height="372" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="2"/>
<text x="980" y="394" class="pt bt" font-size="14">📝 DFIR PROTOCOL — CLAUDE.md</text>
<text x="980" y="412" class="pt" font-size="10">prompt-based · the agent's forensic playbook (could ignore)</text>
<g font-size="10.5">
  <rect x="976" y="424" width="424" height="64" rx="8" fill="#fff" stroke="#7F77DD"/>
  <text x="990" y="446" class="pt bt">Grounding rules</text><text x="990" y="465" class="pt" font-size="9.5">cite only THIS run's evidence bundle —</text><text x="990" y="480" class="pt" font-size="9.5">no prior-case memory, no outside knowledge</text>
  <rect x="976" y="496" width="424" height="64" rx="8" fill="#fff" stroke="#7F77DD"/>
  <text x="990" y="518" class="pt bt">Investigation tracks</text><text x="990" y="537" class="pt" font-size="9.5">route to intrusion / exfiltration / malware</text><text x="990" y="552" class="pt" font-size="9.5">and ask track-specific questions</text>
  <rect x="976" y="568" width="424" height="64" rx="8" fill="#fff" stroke="#7F77DD"/>
  <text x="990" y="590" class="pt bt">Self-correction rules</text><text x="990" y="609" class="pt" font-size="9.5">PRESENT vs EXECUTED · whole-word matching ·</text><text x="990" y="624" class="pt" font-size="9.5">label CONFIRMED / LIKELY / UNVERIFIED</text>
  <rect x="976" y="640" width="424" height="64" rx="8" fill="#fff" stroke="#7F77DD"/>
  <text x="990" y="662" class="pt bt">Citation requirements</text><text x="990" y="681" class="pt" font-size="9.5">every finding maps to an artifact, an inode,</text><text x="990" y="696" class="pt" font-size="9.5">and a source file</text>
</g>
<text x="1188" y="726" text-anchor="middle" class="pt" font-size="9.5">governs the agent (prompt layer, atop the architectural layer)</text>

<path d="M960 560 L868 600" fill="none" stroke="#7F77DD" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#pm)"/>
