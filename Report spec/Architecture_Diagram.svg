<text x="638" y="172" text-anchor="middle" class="rt bt" font-size="12.5">DATA SOURCES — disk images (READ-ONLY)</text>
<g font-size="10.5">
  <rect x="420" y="180" width="143" height="46" rx="7" fill="#fff" stroke="#C0392B"/><text x="491" y="201" text-anchor="middle" class="rt bt">4Dell CPi .E01</text><text x="491" y="216" text-anchor="middle" class="rt" font-size="9">intrusion</text>
  <rect x="567" y="180" width="143" height="46" rx="7" fill="#fff" stroke="#C0392B"/><text x="638" y="201" text-anchor="middle" class="rt bt">SCHARDT.001</text><text x="638" y="216" text-anchor="middle" class="rt" font-size="9">raw · same disk</text>
  <rect x="714" y="180" width="143" height="46" rx="7" fill="#fff" stroke="#C0392B"/><text x="785" y="201" text-anchor="middle" class="rt bt">jean .E01</text><text x="785" y="216" text-anchor="middle" class="rt" font-size="9">exfiltration</text>
</g>

<line x1="14" y1="254" x2="952" y2="254" stroke="#C0392B" stroke-width="3" stroke-dasharray="11 6"/>
<rect x="500" y="243" width="276" height="22" rx="11" fill="#fff" stroke="#C0392B"/>
<text x="638" y="258" text-anchor="middle" class="rt bt" font-size="10">▲ READ-ONLY EVIDENCE · WRITABLE SANDBOX ▼</text>
<line x1="638" y1="236" x2="638" y2="282" stroke="#C0392B" stroke-width="2.5" marker-end="url(#rdm)"/>

<rect x="410" y="284" width="455" height="42" rx="9" fill="#F1EFE8" stroke="#888780"/>
<text x="638" y="302" text-anchor="middle" class="nt bt" font-size="11.5">① ORCHESTRATOR (deterministic) — app.py run_triage() + collect.sh</text>
<text x="638" y="318" text-anchor="middle" class="nt" font-size="9.5">sequences Phase 1 → Phase 2 → render · no LLM</text>

<rect x="410" y="344" width="455" height="120" rx="10" fill="#E1F5EE" stroke="#1D9E75"/>
<text x="638" y="362" text-anchor="middle" class="gt bt" font-size="11.5">PHASE 1 · COLLECTOR — SIFT tools (read-only) · ② TOOL USE</text>
<g font-size="10">
  <rect x="420" y="370" width="105" height="32" rx="6" fill="#fff" stroke="#1D9E75"/><text x="472" y="390" text-anchor="middle" class="gt bt">mmls</text>
  <rect x="530" y="370" width="105" height="32" rx="6" fill="#fff" stroke="#1D9E75"/><text x="582" y="390" text-anchor="middle" class="gt bt">fsstat</text>
  <rect x="640" y="370" width="105" height="32" rx="6" fill="#fff" stroke="#1D9E75"/><text x="692" y="390" text-anchor="middle" class="gt bt">fls -r</text>
  <rect x="750" y="370" width="105" height="32" rx="6" fill="#fff" stroke="#1D9E75"/><text x="802" y="390" text-anchor="middle" class="gt bt">mactime</text>
  <rect x="420" y="408" width="105" height="32" rx="6" fill="#fff" stroke="#1D9E75"/><text x="472" y="428" text-anchor="middle" class="gt bt">prefetch</text>
  <rect x="530" y="408" width="105" height="32" rx="6" fill="#fff" stroke="#1D9E75"/><text x="582" y="428" text-anchor="middle" class="gt bt">readpst</text>
  <rect x="640" y="408" width="105" height="32" rx="6" fill="#fff" stroke="#1D9E75"/><text x="692" y="428" text-anchor="middle" class="gt bt">exfil scan</text>
  <rect x="750" y="408" width="105" height="32" rx="6" fill="#fff" stroke="#1D9E75"/><text x="802" y="428" text-anchor="middle" class="gt bt">recycler</text>
</g>
<text x="638" y="456" text-anchor="middle" class="gt" font-size="9.5">read-only reads → sandbox scratch only</text>

<rect x="500" y="482" width="275" height="40" rx="20" fill="#F1EFE8" stroke="#888780"/>
<text x="638" y="500" text-anchor="middle" class="nt bt" font-size="11.5">EVIDENCE BUNDLE — text digests</text>
<text x="638" y="514" text-anchor="middle" class="nt" font-size="8.5">offset · fsstat · indicators · prefetch · timeline · mail · exfil · recycler</text>

<rect x="410" y="540" width="455" height="322" rx="10" fill="#EEEDFE" stroke="#7F77DD"/>
<text x="638" y="558" text-anchor="middle" class="pt bt" font-size="11.5">PHASE 2 · AUTONOMOUS AGENT — Claude Code (CLAUDE.md)</text>
<rect x="420" y="565" width="435" height="24" rx="6" fill="#26215C"/>
<text x="638" y="581" text-anchor="middle" fill="#EEEDFE" font-size="8" font-family="ui-monospace,Menlo,monospace">claude -p --permission-mode dontAsk --max-turns 10 --output-format stream-json</text>
<text x="638" y="606" text-anchor="middle" class="pt bt" font-size="11">③ ROUTER — triage classifies the case</text>
<g font-size="10">
  <rect x="420" y="612" width="143" height="30" rx="7" fill="#FBEAF0" stroke="#D4537E"/><text x="491" y="631" text-anchor="middle" class="kt bt">INTRUSION</text>
  <rect x="567" y="612" width="143" height="30" rx="7" fill="#FBEAF0" stroke="#D4537E"/><text x="638" y="631" text-anchor="middle" class="kt bt">EXFILTRATION</text>
  <rect x="714" y="612" width="143" height="30" rx="7" fill="#FBEAF0" stroke="#D4537E"/><text x="785" y="631" text-anchor="middle" class="kt bt">MALWARE</text>
</g>
<rect x="420" y="652" width="435" height="30" rx="7" fill="#fff" stroke="#7F77DD"/>
<text x="638" y="672" text-anchor="middle" class="pt" font-size="10">④ EVALUATOR — label findings: CONFIRMED · LIKELY · UNVERIFIED · cite inode</text>
<text x="638" y="697" text-anchor="middle" class="am bt" font-size="9">↻ self-correction loop — confirm with a targeted read, then re-evaluate</text>
<rect x="468" y="704" width="200" height="44" rx="22" fill="#fff" stroke="#7F77DD" stroke-width="2"/>
<text x="568" y="724" text-anchor="middle" class="pt bt" font-size="11">Need more evidence?</text>
<text x="568" y="738" text-anchor="middle" class="pt" font-size="9">agent's own decision</text>
<rect x="700" y="704" width="155" height="44" rx="8" fill="#FCF3E0" stroke="#B9770E"/>
<text x="777" y="723" text-anchor="middle" class="am bt" font-size="10.5">Targeted icat</text>
<text x="777" y="738" text-anchor="middle" class="am" font-size="9">read-only, on demand</text>
<line x1="668" y1="726" x2="698" y2="726" stroke="#B9770E" stroke-width="2" marker-end="url(#amk)"/>
<text x="683" y="718" text-anchor="middle" class="am bt" font-size="9.5">Yes</text>
<path d="M855 712 C 900 712, 900 670, 859 670" fill="none" stroke="#B9770E" stroke-width="2" marker-end="url(#amk)"/>
<text x="906" y="694" class="am" font-size="8.5">re-evaluate</text>
<line x1="568" y1="748" x2="568" y2="858" stroke="#555" stroke-width="2" marker-end="url(#fl)"/>
<text x="540" y="776" class="pt bt" font-size="9.5">No</text>
<text x="582" y="776" class="mut" font-size="9">→ compose report</text>
<text x="596" y="826" class="gt" font-size="9">🔒 tool calls pass the deny-list / read-only allow-list</text>

<rect x="410" y="888" width="455" height="126" rx="10" fill="#E6F1FB" stroke="#378ADD"/>
<text x="638" y="906" text-anchor="middle" class="btx bt" font-size="11.5">OUTPUT PIPELINE</text>
<g font-size="10">
  <rect x="420" y="913" width="143" height="34" rx="6" fill="#fff" stroke="#378ADD"/><text x="491" y="934" text-anchor="middle" class="btx bt">DFIR report</text>
  <rect x="567" y="913" width="143" height="34" rx="6" fill="#fff" stroke="#378ADD"/><text x="638" y="934" text-anchor="middle" class="btx bt">Dashboard</text>
  <rect x="714" y="913" width="143" height="34" rx="6" fill="#fff" stroke="#378ADD"/><text x="785" y="934" text-anchor="middle" class="btx bt">IOC table</text>
</g>
<rect x="420" y="953" width="437" height="53" rx="7" fill="#fff" stroke="#378ADD" stroke-width="2"/>
<text x="638" y="971" text-anchor="middle" class="btx bt" font-size="10.5">RUN LOG (stream-json JSONL)</text>
<text x="638" y="989" text-anchor="middle" class="btx" font-size="9.5">tool calls · timestamps · token usage  ·  findings cite inode + source</text>
<text x="638" y="1001" text-anchor="middle" class="btx" font-size="8.5">supports tracing each finding back to its tool call (req #8)</text>

